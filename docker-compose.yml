services:
  mysql:
    image: mysql:8.4
    container_name: node-watch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: node-watch-clickhouse
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_HTTP_PORT}:8123"
      - "${CLICKHOUSE_NATIVE_PORT}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  redis:
    image: redis:7.4-alpine
    container_name: node-watch-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  redpanda:
    image: redpandadata/redpanda:v25.1.3
    container_name: node-watch-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:${KAFKA_PORT}
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:${KAFKA_REST_PORT}
    ports:
      - "${KAFKA_PORT}:9092"
      - "${KAFKA_ADMIN_PORT}:9644"
      - "${KAFKA_REST_PORT}:8082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

volumes:
  mysql_data:
  clickhouse_data:
  redis_data:
  redpanda_data:

networks:
  default:
    name: node-watch
    driver: bridge