name = "node-watch-probe"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[env.eu]
name = "node-watch-probe-eu"
[env.eu.vars]
REGION = "eu-west"
[[env.eu.queues.consumers]]
queue = "node-watch-eu-west"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

[env.us]
name = "node-watch-probe-us"
[env.us.vars]
REGION = "us-east"
[[env.us.queues.consumers]]
queue = "node-watch-us-east"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

[env.asia]
name = "node-watch-probe-asia"
[env.asia.vars]
REGION = "ap-south"
[[env.asia.queues.consumers]]
queue = "node-watch-ap-south"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
